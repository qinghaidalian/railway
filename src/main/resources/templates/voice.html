<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>语音录制</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Microsoft YaHei", "PingFang SC", "Hiragino Sans", sans-serif;
      }
      body {
        background-color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ---- Header ---- */
      .header {
        background: #07c160;
        color: white;
        padding: 16px 20px;
        text-align: center;
        position: relative;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .header h1 {
        font-size: 18px;
        font-weight: 500;
      }
      .header .back-link {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.9;
      }
      .header .back-link:hover {
        opacity: 1;
      }

      /* ---- Main Content ---- */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        padding: 30px 20px;
      }

      /* ---- Recording Area ---- */
      .recording-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 0;
      }

      .record-hint {
        font-size: 14px;
        color: #999;
        margin-bottom: 30px;
        transition: all 0.3s;
      }
      .record-hint.recording {
        color: #f56c6c;
        animation: hint-blink 0.8s infinite;
      }
      @keyframes hint-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .timer {
        font-size: 28px;
        color: #333;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        margin-bottom: 24px;
        min-height: 42px;
        transition: all 0.3s;
      }
      .timer.recording {
        color: #f56c6c;
      }

      /* ---- Mic Button (WeChat Style) ---- */
      .mic-btn-wrapper {
        position: relative;
        width: 140px;
        height: 140px;
      }
      .mic-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        z-index: 2;
      }
      .mic-btn:active {
        transform: scale(0.94);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .mic-btn.recording {
        transform: scale(1.05);
        box-shadow: 0 6px 28px rgba(244, 67, 54, 0.3);
      }
      .mic-btn svg {
        width: 52px;
        height: 52px;
        fill: #666;
        transition: fill 0.3s;
      }
      .mic-btn.recording svg {
        fill: #f44336;
      }

      /* Pulse rings */
      .pulse-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 2px solid rgba(244, 67, 54, 0.3);
        opacity: 0;
        z-index: 1;
      }
      .pulse-ring.animating {
        animation: pulse 1.2s ease-out infinite;
      }
      .pulse-ring.animating:nth-child(2) {
        animation-delay: 0.4s;
      }
      .pulse-ring.animating:nth-child(3) {
        animation-delay: 0.8s;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.86);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.4);
          opacity: 0;
        }
      }

      /* ---- Wave Bars (visualizer) ---- */
      .wave-bars {
        display: none;
        align-items: flex-end;
        gap: 4px;
        height: 32px;
        margin-bottom: 20px;
      }
      .wave-bars.visible {
        display: flex;
      }
      .wave-bar {
        width: 5px;
        background: #f44336;
        border-radius: 3px;
        animation: wave 0.6s ease-in-out infinite alternate;
      }
      @keyframes wave {
        0% {
          height: 8px;
        }
        100% {
          height: 28px;
        }
      }

      /* ---- Divider ---- */
      .divider {
        border: none;
        border-top: 1px solid #e0e0e0;
        margin: 20px 0;
      }

      /* ---- Recordings List ---- */
      .list-header {
        font-size: 14px;
        color: #999;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .recording-item {
        background: white;
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        transition: background 0.2s;
      }
      .recording-item:hover {
        background: #fafafa;
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 10px 0 18px;
      }
      .pagination .page-info {
        color: #666;
        font-size: 14px;
      }
      .pagination select,
      .pagination button {
        padding: 8px 12px;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        background: white;
        font-size: 14px;
        cursor: pointer;
      }
      .pagination select {
        min-width: 88px;
      }
      .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .play-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid #07c160;
        background: white;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .play-btn:hover {
        background: #e8f8ee;
      }
      .play-btn.playing {
        background: #07c160;
      }
      .play-btn svg {
        width: 18px;
        height: 18px;
        fill: #07c160;
      }
      .play-btn.playing svg {
        fill: white;
      }

      .recording-info {
        flex: 1;
        min-width: 0;
      }
      .recording-date {
        font-size: 13px;
        color: #333;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .recording-duration,
      .recording-progress {
        font-size: 12px;
        color: #999;
      }
      .recording-progress {
        margin-top: 2px;
      }
      .recording-progress-wrapper {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .seek-bar {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #f0f0f0;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .seek-fill {
        height: 100%;
        width: 0%;
        background: #07c160;
        border-radius: 999px;
        transition: width 0.1s linear;
      }
      .seek-thumb {
        position: absolute;
        top: 50%;
        left: 0;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #07c160;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .recording-wave {
        flex: 1;
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 28px;
        min-width: 0;
      }
      .recording-wave .dot {
        width: 3px;
        background: #d9d9d9;
        border-radius: 2px;
        transition: background 0.3s;
      }
      .recording-wave .dot.active {
        background: #07c160;
      }

      /* ---- Delete Button ---- */
      .delete-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        opacity: 0.4;
      }
      .delete-btn:hover {
        background: #fff0f0;
        opacity: 1;
      }
      .delete-btn svg {
        width: 16px;
        height: 16px;
        fill: #e74c3c;
      }

      /* ---- Empty State ---- */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #ccc;
      }
      .empty-state svg {
        width: 64px;
        height: 64px;
        fill: #ddd;
        margin-bottom: 16px;
      }
      .empty-state p {
        font-size: 14px;
      }

      /* ---- Toast ---- */
      .toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: all 0.2s;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* ---- Footer ---- */
      .footer {
        text-align: center;
        padding: 16px;
        color: #ccc;
        font-size: 12px;
      }

      /* ---- Responsive ---- */
      @media (max-width: 480px) {
        .main {
          padding: 20px 14px;
        }
        .mic-btn-wrapper {
          width: 120px;
          height: 120px;
        }
        .mic-btn {
          width: 100px;
          height: 100px;
          top: 10px;
          left: 10px;
        }
        .mic-btn svg {
          width: 44px;
          height: 44px;
        }
        .pulse-ring {
          width: 120px;
          height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/menu" class="back-link">← 返回菜单</a>
      <h1>🎤 语音录制</h1>
    </div>

    <div class="main">
      <!-- Recording Area -->
      <div class="recording-area">
        <div class="record-hint" id="recordHint">按住说话</div>
        <div class="timer" id="timer">00:00</div>
        <div class="wave-bars" id="waveBars">
          <div class="wave-bar" style="animation-delay: 0s"></div>
          <div class="wave-bar" style="animation-delay: 0.1s"></div>
          <div class="wave-bar" style="animation-delay: 0.2s"></div>
          <div class="wave-bar" style="animation-delay: 0.05s"></div>
          <div class="wave-bar" style="animation-delay: 0.15s"></div>
          <div class="wave-bar" style="animation-delay: 0.25s"></div>
          <div class="wave-bar" style="animation-delay: 0.1s"></div>
          <div class="wave-bar" style="animation-delay: 0.2s"></div>
          <div class="wave-bar" style="animation-delay: 0.3s"></div>
          <div class="wave-bar" style="animation-delay: 0.05s"></div>
          <div class="wave-bar" style="animation-delay: 0.15s"></div>
          <div class="wave-bar" style="animation-delay: 0.25s"></div>
        </div>

        <div class="mic-btn-wrapper">
          <div class="pulse-ring" id="pulse1"></div>
          <div class="pulse-ring" id="pulse2"></div>
          <div class="pulse-ring" id="pulse3"></div>
          <button class="mic-btn" id="micBtn" title="按住说话">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
              />
              <path
                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
              />
            </svg>
          </button>
        </div>
      </div>

      <hr class="divider" />

      <!-- Recordings List -->
      <div class="list-header">
        <span>录制历史</span>
        <span id="recordCount" style="font-weight: 600; color: #07c160"
          >0 条</span
        >
      </div>

      <div class="pagination">
        <label for="pageSizeSelect">
          每页显示
          <select id="pageSizeSelect">
            <option value="5">5</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="100">100</option>
          </select>
        </label>
        <div class="page-info">
          第 <strong id="currentPage">1</strong> 页 / 共
          <strong id="totalPages">1</strong> 页
        </div>
        <div>
          <button id="prevPage" type="button">上一页</button>
          <button id="nextPage" type="button">下一页</button>
        </div>
      </div>

      <div id="recordingsList">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"
            />
          </svg>
          <p>暂无录音，按住上方按钮开始录制</p>
        </div>
      </div>
    </div>

    <div class="footer">语音录制 &copy; 2026</div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Hidden audio element for playback -->
    <audio id="audioPlayer" preload="auto" style="display: none"></audio>

    <script>
      (function () {
        // ---- DOM refs ----
        const micBtn = document.getElementById("micBtn");
        const recordHint = document.getElementById("recordHint");
        const timerEl = document.getElementById("timer");
        const waveBars = document.getElementById("waveBars");
        const pulse1 = document.getElementById("pulse1");
        const pulse2 = document.getElementById("pulse2");
        const pulse3 = document.getElementById("pulse3");
        const recordingsList = document.getElementById("recordingsList");
        const emptyState = document.getElementById("emptyState");
        const recordCount = document.getElementById("recordCount");
        const toast = document.getElementById("toast");
        const audioPlayer = document.getElementById("audioPlayer");
        const pageSizeSelect = document.getElementById("pageSizeSelect");
        const prevPageBtn = document.getElementById("prevPage");
        const nextPageBtn = document.getElementById("nextPage");
        const currentPageEl = document.getElementById("currentPage");
        const totalPagesEl = document.getElementById("totalPages");

        // ---- State ----
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStartTime = null;
        let timerInterval = null;
        let isRecording = false;
        let currentPlayingBtn = null;
        let currentAudioId = null;
        let progressInterval = null;
        let isSeeking = false;
        let seekTargetBar = null;
        let hasDragged = false;
        let lastSeekPageX = 0;
        let currentPage = 1;
        let pageSize = 5;
        let totalPages = 1;

        // ---- Toast Helper ----
        let toastTimer = null;
        function showToast(msg) {
          toast.textContent = msg;
          toast.classList.add("show");
          if (toastTimer) clearTimeout(toastTimer);
          toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
        }

        // ---- Timer ----
        function formatTime(seconds) {
          const s = seconds % 60;
          const m = Math.floor(seconds / 60);
          return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        function startTimer() {
          recordingStartTime = Date.now();
          timerEl.classList.add("recording");
          timerEl.textContent = "00:00";
          timerInterval = setInterval(() => {
            const elapsed = Math.floor(
              (Date.now() - recordingStartTime) / 1000,
            );
            timerEl.textContent = formatTime(elapsed);
          }, 200);
        }

        function stopTimer() {
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = null;
          timerEl.classList.remove("recording");
          const elapsed = recordingStartTime
            ? Math.floor((Date.now() - recordingStartTime) / 1000)
            : 0;
          timerEl.textContent = formatTime(elapsed);
          return elapsed;
        }

        // ---- Visual Feedback ----
        function setRecordingUI(active) {
          if (active) {
            micBtn.classList.add("recording");
            recordHint.classList.add("recording");
            recordHint.textContent = "正在录音...";
            waveBars.classList.add("visible");
            pulse1.classList.add("animating");
            pulse2.classList.add("animating");
            pulse3.classList.add("animating");
          } else {
            micBtn.classList.remove("recording");
            recordHint.classList.remove("recording");
            recordHint.textContent = "按住说话";
            waveBars.classList.remove("visible");
            pulse1.classList.remove("animating");
            pulse2.classList.remove("animating");
            pulse3.classList.remove("animating");
          }
        }

        // ---- Start Recording ----
        async function startRecording() {
          if (isRecording) return;

          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream, {
              mimeType: MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
                ? "audio/webm;codecs=opus"
                : "audio/webm",
            });

            mediaRecorder.addEventListener("dataavailable", (e) => {
              if (e.data.size > 0) audioChunks.push(e.data);
            });

            mediaRecorder.addEventListener("stop", async () => {
              // Stop all tracks
              stream.getTracks().forEach((t) => t.stop());

              const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
              const duration = stopTimer();
              setRecordingUI(false);
              isRecording = false;

              // Save to server
              await saveRecording(audioBlob, duration);
            });

            mediaRecorder.start();
            isRecording = true;
            setRecordingUI(true);
            startTimer();
          } catch (err) {
            console.error("麦克风访问失败:", err);
            showToast("无法访问麦克风，请检查权限设置");
          }
        }

        // ---- Stop Recording ----
        function stopRecording() {
          if (
            !isRecording ||
            !mediaRecorder ||
            mediaRecorder.state !== "recording"
          )
            return;
          mediaRecorder.stop();
        }

        // ---- Save to Server ----
        async function saveRecording(audioBlob, duration) {
          const formData = new FormData();
          formData.append("audio", audioBlob, "recording.webm");
          formData.append("duration", duration);

          try {
            const resp = await fetch("/api/voice/save", {
              method: "POST",
              body: formData,
            });
            const result = await resp.json();
            if (result.success) {
              showToast("✓ 语音已保存");
              loadRecordings(currentPage, pageSize);
            } else {
              showToast("保存失败: " + (result.error || "未知错误"));
            }
          } catch (err) {
            console.error("保存失败:", err);
            showToast("保存失败，请检查网络");
          }
        }

        function updatePaginationControls() {
          currentPageEl.textContent = currentPage;
          totalPagesEl.textContent = totalPages;
          prevPageBtn.disabled = currentPage <= 1;
          nextPageBtn.disabled = currentPage >= totalPages;
          pageSizeSelect.value = String(pageSize);
        }

        async function loadRecordings(page = currentPage, size = pageSize) {
          currentPage = page < 1 ? 1 : page;
          pageSize = size < 1 ? 5 : size;

          try {
            const resp = await fetch(
              `/api/voice/list?page=${currentPage}&size=${pageSize}`,
            );
            const data = await resp.json();
            const items = data.items || [];
            const total = Number(data.total || 0);
            totalPages = Math.max(1, Math.ceil(total / pageSize));

            if (total > 0 && currentPage > totalPages) {
              currentPage = totalPages;
              return loadRecordings(currentPage, pageSize);
            }

            recordCount.textContent = total + " 条";
            updatePaginationControls();

            if (items.length === 0) {
              recordingsList.innerHTML = "";
              recordingsList.appendChild(emptyState);
              emptyState.style.display = "";
              return;
            }

            emptyState.style.display = "none";
            recordingsList.innerHTML = items
              .map((item, idx) => {
                const date = new Date(item.createdAt);
                const dateStr = date.toLocaleString("zh-CN", {
                  month: "2-digit",
                  day: "2-digit",
                  hour: "2-digit",
                  minute: "2-digit",
                });
                const dur = item.duration || 0;
                const durStr = dur > 0 ? formatTime(dur) : "--:--";
                // Generate random wave dots for visual effect
                const waveDots = Array.from(
                  { length: 18 },
                  () => Math.floor(Math.random() * 22) + 6,
                );
                return `
                            <div class="recording-item" data-id="${item.id}">
                                <button class="play-btn" data-id="${item.id}" data-duration="${dur}"
                                        onclick="togglePlay(this, ${item.id})" title="播放">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M8 5v14l11-7z" class="play-icon"/>
                                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" class="pause-icon" style="display:none"/>
                                    </svg>
                                </button>
                                <div class="recording-wave">
                                    ${waveDots
                                      .map(
                                        (h) =>
                                          `<div class="dot" style="height:${h}px"></div>`,
                                      )
                                      .join("")}
                                </div>
                                <div class="recording-info">
                                    <div class="recording-date">${dateStr}</div>
                                    <div class="recording-duration">总时长 ⏱ ${durStr}</div>
                                    <div class="recording-progress-wrapper">
                                      <div class="recording-progress" id="progress-${item.id}">播放 00:00 / ${durStr}</div>
                                      <div class="seek-bar" id="seek-${item.id}" data-id="${item.id}" data-duration="${dur}" title="点击或拖动调整播放位置">
                                        <div class="seek-fill" id="fill-${item.id}"></div>
                                        <div class="seek-thumb" id="thumb-${item.id}"></div>
                                      </div>
                                    </div>
                                </div>
                                <button class="delete-btn" data-id="${item.id}"
                                        onclick="deleteRecording(event, ${item.id})" title="删除">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                    </svg>
                                </button>
                            </div>
                        `;
              })
              .join("");
            attachSeekControls();
          } catch (err) {
            console.error("加载列表失败:", err);
          }
        }

        // ---- Playback ----
        window.togglePlay = function (btn, id) {
          if (currentPlayingBtn && currentPlayingBtn !== btn) {
            // Stop previous
            audioPlayer.pause();
            resetPlayBtn(currentPlayingBtn);
          }

          const progressEl = document.getElementById(`progress-${id}`);
          const idString = String(id);

          if (btn.classList.contains("playing")) {
            // Pause
            audioPlayer.pause();
            resetPlayBtn(btn);
            updateSeekUI(
              idString,
              audioPlayer.currentTime,
              audioPlayer.duration || 0,
            );
            currentPlayingBtn = null;
          } else {
            // Play or resume
            if (currentAudioId !== idString) {
              audioPlayer.pause();
              audioPlayer.src = "/api/voice/audio/" + idString;
              currentAudioId = idString;
            }
            audioPlayer.play().catch((err) => {
              console.error("播放失败:", err);
              showToast("播放失败");
            });
            btn.classList.add("playing");
            btn.querySelector(".play-icon").style.display = "none";
            btn.querySelector(".pause-icon").style.display = "";
            currentPlayingBtn = btn;

            // Animate wave dots
            const item = btn.closest(".recording-item");
            if (item) {
              const dots = item.querySelectorAll(".recording-wave .dot");
              let dotIdx = 0;
              const dotInterval = setInterval(() => {
                dots.forEach((d, i) => {
                  d.classList.toggle("active", i <= dotIdx % dots.length);
                });
                dotIdx++;
              }, 120);
              btn._dotInterval = dotInterval;
            }

            startProgressInterval(progressEl);
          }

          audioPlayer.onended = () => {
            resetPlayBtn(btn);
            updateSeekUI(idString, 0, audioPlayer.duration || 0);
            currentPlayingBtn = null;
          };
        };

        function startProgressInterval(progressEl) {
          if (progressInterval) {
            clearInterval(progressInterval);
          }
          progressInterval = setInterval(() => {
            if (
              currentAudioId &&
              !audioPlayer.paused &&
              audioPlayer.duration > 0 &&
              !isSeeking
            ) {
              updateSeekUI(
                currentAudioId,
                audioPlayer.currentTime,
                audioPlayer.duration,
              );
            }
          }, 200);
        }

        function stopProgressInterval() {
          if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
          }
        }

        function updateSeekUI(id, currentTime, duration) {
          const progressEl = document.getElementById(`progress-${id}`);
          const fillEl = document.getElementById(`fill-${id}`);
          const thumbEl = document.getElementById(`thumb-${id}`);
          if (progressEl) {
            const displayTime = isNaN(currentTime)
              ? 0
              : Math.floor(currentTime);
            progressEl.textContent = `播放 ${formatTime(displayTime)} / ${formatTime(Math.max(0, Math.floor(duration || 0)))}`;
          }
          if (fillEl && thumbEl && duration > 0) {
            const ratio = Math.min(1, Math.max(0, currentTime / duration));
            fillEl.style.width = `${ratio * 100}%`;
            thumbEl.style.left = `${ratio * 100}%`;
          }
        }

        function loadAudioAtPosition(id, targetTime, shouldPlay) {
          const idString = String(id);
          const isNewSource = currentAudioId !== idString;
          const safeTarget = Math.max(0, targetTime);

          // Always store the latest target so any pending handler can pick it up
          audioPlayer._pendingTarget = safeTarget;
          audioPlayer._pendingPlay = shouldPlay;

          if (isNewSource) {
            // Reset previous button state
            if (currentPlayingBtn) {
              resetPlayBtn(currentPlayingBtn);
            }
            // Remove any stale ready handler from a previous load
            if (audioPlayer._readyHandler) {
              audioPlayer.removeEventListener(
                "canplaythrough",
                audioPlayer._readyHandler,
              );
              audioPlayer._readyHandler = null;
            }

            currentAudioId = idString;
            audioPlayer.pause();

            // Use #t= fragment for reliable initial seek position.
            // The browser will seek to this time as soon as metadata loads.
            audioPlayer.src =
              "/api/voice/audio/" + idString + "#t=" + safeTarget;

            // Fallback handler: ensures correct position and auto-plays after load
            audioPlayer._readyHandler = () => {
              audioPlayer.removeEventListener(
                "canplaythrough",
                audioPlayer._readyHandler,
              );
              audioPlayer._readyHandler = null;
              const t =
                audioPlayer._pendingTarget != null
                  ? audioPlayer._pendingTarget
                  : 0;
              const p = audioPlayer._pendingPlay !== false;
              if (
                audioPlayer.duration > 0 &&
                isFinite(audioPlayer.duration)
              ) {
                // Only adjust if browser didn't honour the #t= fragment
                if (Math.abs(audioPlayer.currentTime - t) > 0.5) {
                  audioPlayer.currentTime = Math.min(t, audioPlayer.duration);
                }
              }
              if (p) {
                audioPlayer.play().catch(() => {});
              }
            };
            audioPlayer.addEventListener(
              "canplaythrough",
              audioPlayer._readyHandler,
            );
            audioPlayer.load();
          } else {
            // Same source — seek immediately if enough data is buffered
            if (
              audioPlayer.readyState >= 2 &&
              audioPlayer.duration > 0 &&
              isFinite(audioPlayer.duration)
            ) {
              audioPlayer.currentTime = Math.min(
                safeTarget,
                audioPlayer.duration,
              );
              if (audioPlayer._pendingPlay) {
                audioPlayer.play().catch(() => {});
              }
            }
            // If not ready yet, the existing canplaythrough handler will fire
            // and use the latest _pendingTarget automatically
          }
        }

        function seekAndPlay(id, targetTime, playBtn) {
          stopProgressInterval();
          loadAudioAtPosition(id, targetTime, true);

          if (playBtn) {
            // Reset previous button if different
            if (currentPlayingBtn && currentPlayingBtn !== playBtn) {
              resetPlayBtn(currentPlayingBtn);
            }
            currentPlayingBtn = playBtn;
            playBtn.classList.add("playing");
            playBtn.querySelector(".play-icon").style.display = "none";
            playBtn.querySelector(".pause-icon").style.display = "";

            // Start wave animation
            const item = playBtn.closest(".recording-item");
            if (item) {
              const dots = item.querySelectorAll(".recording-wave .dot");
              let dotIdx = 0;
              if (playBtn._dotInterval) clearInterval(playBtn._dotInterval);
              const dotInterval = setInterval(() => {
                dots.forEach((d, i) => {
                  d.classList.toggle("active", i <= dotIdx % dots.length);
                });
                dotIdx++;
              }, 120);
              playBtn._dotInterval = dotInterval;
            }
          }

          startProgressInterval();
        }

        let seekHandlersAttached = false;
        function attachSeekControls() {
          const onSeekMove = (event) => {
            if (!isSeeking || !seekTargetBar) return;
            hasDragged = true;
            event.preventDefault();
            const pageX = event.type.startsWith("touch")
              ? event.touches[0].clientX
              : event.clientX;
            lastSeekPageX = pageX;
            if (seekTargetBar._updateDragUI) {
              seekTargetBar._updateDragUI(pageX);
            }
          };

          const onSeekEnd = (event) => {
            if (!isSeeking || !seekTargetBar) return;
            // Use last known drag position if dragged, otherwise use click position
            const pageX = event.type.startsWith("touch")
              ? event.changedTouches && event.changedTouches[0]
                ? event.changedTouches[0].clientX
                : lastSeekPageX
              : event.clientX;
            const commitX = hasDragged ? lastSeekPageX : pageX;
            if (seekTargetBar._commitSeek) {
              seekTargetBar._commitSeek(commitX);
            }
            isSeeking = false;
            seekTargetBar = null;
            hasDragged = false;
          };

          if (!seekHandlersAttached) {
            document.addEventListener("mousemove", onSeekMove);
            document.addEventListener("touchmove", onSeekMove, {
              passive: false,
            });
            document.addEventListener("mouseup", onSeekEnd);
            document.addEventListener("touchend", onSeekEnd);
            seekHandlersAttached = true;
          }

          recordingsList.querySelectorAll(".seek-bar").forEach((bar) => {
            const id = bar.dataset.id;
            const duration = Number(bar.dataset.duration) || 0;
            const item = bar.closest(".recording-item");
            const playBtn = item ? item.querySelector(".play-btn") : null;

            // Update UI and immediately scrub/play while dragging
            const updateDragUI = (pageX) => {
              const rect = bar.getBoundingClientRect();
              const ratio = Math.min(
                1,
                Math.max(0, (pageX - rect.left) / rect.width),
              );
              const targetTime = ratio * duration;

              // Immediately seek and play at the dragged position
              try {
                // Use loadAudioAtPosition to avoid duplicating seek logic
                loadAudioAtPosition(id, targetTime, true);
              } catch (e) {
                console.error("scrub play error", e);
              }

              // Update visual seek UI
              updateSeekUI(id, targetTime, duration);

              // Ensure play button shows playing state and animate dots
              if (playBtn) {
                if (!playBtn.classList.contains("playing")) {
                  playBtn.classList.add("playing");
                  const playIcon = playBtn.querySelector(".play-icon");
                  const pauseIcon = playBtn.querySelector(".pause-icon");
                  if (playIcon) playIcon.style.display = "none";
                  if (pauseIcon) pauseIcon.style.display = "";
                }

                const item = playBtn.closest(".recording-item");
                if (item && !playBtn._dotInterval) {
                  const dots = item.querySelectorAll(".recording-wave .dot");
                  let dotIdx = 0;
                  const dotInterval = setInterval(() => {
                    dots.forEach((d, i) => {
                      d.classList.toggle("active", i <= dotIdx % dots.length);
                    });
                    dotIdx++;
                  }, 120);
                  playBtn._dotInterval = dotInterval;
                }
              }
            };

            // Commit: actually seek audio and play
            const commitSeek = (pageX) => {
              const rect = bar.getBoundingClientRect();
              const ratio = Math.min(
                1,
                Math.max(0, (pageX - rect.left) / rect.width),
              );
              const targetTime = ratio * duration;
              seekAndPlay(id, targetTime, playBtn);
              updateSeekUI(id, targetTime, duration);
            };

            const onSeekStart = (event) => {
              event.preventDefault();
              isSeeking = true;
              seekTargetBar = bar;
              hasDragged = false;
              const pageX = event.type.startsWith("touch")
                ? event.touches[0].clientX
                : event.clientX;
              lastSeekPageX = pageX;
              updateDragUI(pageX);
            };

            bar._updateDragUI = updateDragUI;
            bar._commitSeek = commitSeek;

            bar.addEventListener("mousedown", onSeekStart);
            bar.addEventListener("touchstart", onSeekStart, { passive: false });
          });
        }

        function resetPlayBtn(btn) {
          if (btn) {
            btn.classList.remove("playing");
            btn.querySelector(".play-icon").style.display = "";
            btn.querySelector(".pause-icon").style.display = "none";
            if (btn._dotInterval) {
              clearInterval(btn._dotInterval);
              btn._dotInterval = null;
            }
            const item = btn.closest(".recording-item");
            if (item) {
              item
                .querySelectorAll(".recording-wave .dot")
                .forEach((d) => d.classList.remove("active"));
            }
          }
          stopProgressInterval();
        }

        // ---- Delete Recording ----
        window.deleteRecording = async function (e, id) {
          e.stopPropagation();
          if (!confirm("确定要删除这条录音吗？")) return;

          try {
            const resp = await fetch("/api/voice/" + id, { method: "DELETE" });
            const result = await resp.json();
            if (result.success) {
              showToast("✓ 已删除");
              loadRecordings(currentPage, pageSize);
            } else {
              showToast("删除失败: " + (result.error || "未知错误"));
            }
          } catch (err) {
            console.error("删除失败:", err);
            showToast("删除失败，请检查网络");
          }
        };

        prevPageBtn.addEventListener("click", () => {
          if (currentPage > 1) {
            loadRecordings(currentPage - 1, pageSize);
          }
        });

        nextPageBtn.addEventListener("click", () => {
          if (currentPage < totalPages) {
            loadRecordings(currentPage + 1, pageSize);
          }
        });

        pageSizeSelect.addEventListener("change", () => {
          pageSize = Number(pageSizeSelect.value) || 5;
          currentPage = 1;
          loadRecordings(currentPage, pageSize);
        });

        // ---- Event Listeners ----
        // Mouse / Touch: press and hold
        micBtn.addEventListener("mousedown", (e) => {
          e.preventDefault();
          startRecording();
        });
        micBtn.addEventListener("mouseup", (e) => {
          e.preventDefault();
          stopRecording();
        });
        micBtn.addEventListener("mouseleave", () => {
          stopRecording();
        });

        micBtn.addEventListener("touchstart", (e) => {
          e.preventDefault();
          startRecording();
        });
        micBtn.addEventListener("touchend", (e) => {
          e.preventDefault();
          stopRecording();
        });
        micBtn.addEventListener("touchcancel", () => {
          stopRecording();
        });

        // Keyboard: hold Space to record
        document.addEventListener("keydown", (e) => {
          if (
            e.code === "Space" &&
            !isRecording &&
            document.activeElement === document.body
          ) {
            e.preventDefault();
            startRecording();
          }
        });
        document.addEventListener("keyup", (e) => {
          if (e.code === "Space" && isRecording) {
            e.preventDefault();
            stopRecording();
          }
        });

        // ---- Init ----
        loadRecordings();
      })();
    </script>
  </body>
</html>
