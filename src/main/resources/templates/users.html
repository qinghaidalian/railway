<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理 - Demo</title>
    <style>
      body {
        background: #f4f7ff;
        color: #2b3a67;
        font-family: "Microsoft YaHei", sans-serif;
        margin: 0;
        padding: 24px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 22px;
      }
      .page-header h1 {
        font-size: 24px;
      }
      .nav-buttons button {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        margin-left: 10px;
      }
      .btn-primary {
        background: #4f7df0;
        color: white;
      }
      .btn-secondary {
        background: #ffffff;
        color: #4f7df0;
        border: 1px solid #cbd6f3;
      }
      .panel {
        background: white;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(45, 72, 153, 0.08);
        margin-bottom: 20px;
      }
      .panel h2 {
        margin-bottom: 16px;
        font-size: 18px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th,
      td {
        padding: 14px 12px;
        text-align: left;
        border-bottom: 1px solid #eef1fc;
        font-size: 14px;
        word-wrap: break-word;
      }
      th {
        background: #f7f9ff;
        color: #4d5c88;
      }
      td.actions {
        width: 160px;
      }
      .badge {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
      }
      .badge-enabled {
        background: #e6f7ff;
        color: #1890ff;
      }
      .badge-disabled {
        background: #fff1f0;
        color: #cf1322;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
      }
      .form-group label {
        margin-bottom: 8px;
        font-size: 13px;
        color: #6c7a9d;
      }
      .form-group input,
      .form-group select {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #dbe1f0;
        font-size: 14px;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .toolbar .count {
        color: #6c7a9d;
      }
      .small-note {
        font-size: 13px;
        color: #8c97b8;
      }
      .action-link {
        color: #4f7df0;
        text-decoration: none;
        margin-right: 8px;
      }
      .action-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div>
        <h1>用户管理</h1>
        <div class="small-note">
          可以在此页面登录后执行用户新增、编辑和删除。
        </div>
      </div>
      <div class="nav-buttons">
        <button class="btn-secondary" onclick="window.location.href = '/menu'">
          返回菜单
        </button>
        <button class="btn-primary" onclick="window.location.href = '/logout'">
          登出
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div class="count">
          共 <strong th:text="${#lists.size(users)}">0</strong> 位用户
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>全名</th>
            <th>邮箱</th>
            <th>状态</th>
            <th class="actions">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.username}">demo</td>
            <td th:text="${user.fullName}">Demo 用户</td>
            <td th:text="${user.email}">demo@example.com</td>
            <td>
              <span
                th:text="${user.enabled ? '启用' : '禁用'}"
                th:classappend="${user.enabled} ? 'badge badge-enabled' : 'badge badge-disabled'"
                >启用</span
              >
            </td>
            <td class="actions">
              <a
                class="action-link"
                th:href="@{/users/edit/{id}(id=${user.id})}"
                >编辑</a
              >
              <a
                class="action-link"
                th:href="@{/users/delete/{id}(id=${user.id})}"
                onclick="return confirm('确认删除此用户？');"
                >删除</a
              >
            </td>
          </tr>
          <tr th:if="${users == null or users.isEmpty()}">
            <td
              colspan="6"
              style="text-align: center; padding: 24px 0; color: #8c97b8"
            >
              暂无用户数据
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="panel">
      <h2 th:text="${userForm.id != null} ? '编辑用户' : '新增用户'">
        新增用户
      </h2>
      <form th:action="@{/users/save}" th:object="${userForm}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="form-row">
          <div class="form-group">
            <label>用户名</label>
            <input
              type="text"
              th:field="*{username}"
              placeholder="请输入用户名"
              required
            />
          </div>
          <div class="form-group">
            <label>密码</label>
            <input
              type="password"
              th:field="*{password}"
              placeholder="请输入密码"
              required
            />
          </div>
          <div class="form-group">
            <label>全名</label>
            <input
              type="text"
              th:field="*{fullName}"
              placeholder="请输入全名"
            />
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" th:field="*{email}" placeholder="请输入邮箱" />
          </div>
          <div class="form-group">
            <label>是否启用</label>
            <select th:field="*{enabled}">
              <option th:value="true">启用</option>
              <option th:value="false">禁用</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" type="submit" style="margin-top: 12px">
          保存用户
        </button>
      </form>
    </div>
  </body>
</html>
