<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>菜单 - Demo</title>
    <style>
      body {
        margin: 0;
        font-family: "Microsoft YaHei", sans-serif;
        background: #f0f2f8;
        color: #2d3a59;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 260px;
        background: linear-gradient(180deg, #2f54eb, #4b7cff);
        color: white;
        padding: 28px 20px;
      }
      .sidebar h2 {
        margin: 0 0 24px;
        font-size: 22px;
      }
      .sidebar p {
        color: #dbe4ff;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .nav-item {
        display: block;
        padding: 12px 16px;
        border-radius: 12px;
        color: #f0f5ff;
        text-decoration: none;
        margin-bottom: 12px;
        transition: background 0.2s ease;
      }
      .nav-item:hover,
      .nav-item.active {
        background: rgba(255, 255, 255, 0.12);
      }
      .nav-section {
        margin-top: 20px;
      }
      .main {
        flex: 1;
        padding: 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 26px;
      }
      .topbar h1 {
        margin: 0;
        font-size: 28px;
      }
      .topbar .user-info {
        color: #5a6b96;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 22px 50px rgba(26, 43, 113, 0.08);
      }
      .card h2 {
        margin-top: 0;
      }
      .card p {
        line-height: 1.8;
        color: #5e6f94;
      }
      .button-bar {
        margin-top: 20px;
      }
      .button-bar a {
        display: inline-block;
        margin-right: 12px;
        padding: 12px 22px;
        border-radius: 12px;
        text-decoration: none;
        color: white;
        background: #2f54eb;
      }
      .button-bar a.secondary {
        background: #8c9eff;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>系统菜单</h2>
        <p>
          欢迎，<span
            th:text="${loginUser.fullName != null ? loginUser.fullName : loginUser.username}"
            >用户</span
          >。
        </p>
        <div class="nav-section">
          <a class="nav-item active" href="/menu">首页</a>
          <a class="nav-item" href="/users">用户管理</a>
          <a class="nav-item" href="/voice">语音录制</a>
          <a class="nav-item" href="/items">商品一览</a>
        </div>
      </aside>
      <main class="main">
        <div class="topbar">
          <h1>菜单中心</h1>
          <div class="user-info">
            <span th:text="${loginUser.username}">admin</span>
            &nbsp;|&nbsp;
            <a href="/logout" style="color: #2f54eb; text-decoration: none"
              >退出登录</a
            >
          </div>
        </div>
        <div class="card">
          <h2>欢迎使用后台管理系统</h2>
          <p>
            这里是系统主菜单页面。左侧导航栏包含“用户管理”、“语音录制”和“商品一览”入口，点击即可进入相应功能页面。
          </p>
          <div class="button-bar">
            <a href="/users">进入用户管理</a>
            <a href="/voice">语音录制</a>
            <a href="/items">商品一览</a>
            <a href="/menu">返回菜单</a>
            <a class="secondary" href="/login">重新登录</a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
