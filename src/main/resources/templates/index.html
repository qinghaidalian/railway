<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            color: #2d8cf0;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            font-size: 16px;
        }
        .info {
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Spring Boot 项目启动成功</h1>
        <p>欢迎访问我的 Spring Boot 应用首页</p>
        <div class="info">当前时间：<span id="time"></span></div>
    </div>

    <script>
        // 显示当前时间
        document.getElementById("time").innerText = new Date().toLocaleString();
    </script>
</body>
</html>
