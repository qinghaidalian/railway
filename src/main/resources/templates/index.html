<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一览 - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", "Hiragino Sans", sans-serif;
      }
      body {
        background-color: #f0f2f5;
        padding: 20px;
      }

      /* ---- Header ---- */
      .header {
        background: linear-gradient(135deg, #2d8cf0, #1a6dd1);
        color: white;
        padding: 20px 30px;
        border-radius: 10px 10px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 600;
      }
      .header .time {
        font-size: 14px;
        opacity: 0.85;
      }

      /* ---- Toolbar ---- */
      .toolbar {
        background: white;
        padding: 14px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e8e8e8;
      }
      .toolbar .record-count {
        font-size: 14px;
        color: #666;
      }
      .toolbar .record-count span {
        color: #2d8cf0;
        font-weight: 700;
      }
      .toolbar .actions button {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #2d8cf0;
        color: white;
      }
      .btn-primary:hover {
        background: #1a6dd1;
      }
      .btn-outline {
        background: white;
        color: #666;
        border: 1px solid #d9d9d9 !important;
        margin-left: 10px;
      }
      .btn-outline:hover {
        color: #2d8cf0;
        border-color: #2d8cf0 !important;
      }

      /* ---- Table ---- */
      .table-wrapper {
        background: white;
        border-radius: 0 0 10px 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1200px;
      }
      thead th {
        background: #fafafa;
        color: #333;
        font-weight: 600;
        font-size: 13px;
        padding: 14px 16px;
        text-align: left;
        border-bottom: 2px solid #e8e8e8;
        white-space: nowrap;
      }
      tbody td {
        padding: 12px 16px;
        font-size: 13px;
        color: #555;
        border-bottom: 1px solid #f0f0f0;
        white-space: nowrap;
      }
      tbody tr:hover {
        background-color: #e6f7ff;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }

      /* ---- Status Badge ---- */
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge-done {
        background: #f6ffed;
        color: #52c41a;
        border: 1px solid #b7eb8f;
      }
      .badge-progress {
        background: #e6f7ff;
        color: #1890ff;
        border: 1px solid #91d5ff;
      }
      .badge-pending {
        background: #fff7e6;
        color: #fa8c16;
        border: 1px solid #ffd591;
      }

      /* ---- Amount ---- */
      .amount {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* ---- Empty State ---- */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #bbb;
        font-size: 16px;
      }

      /* ---- Pagination ---- */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 16px;
        padding: 14px 0;
      }
      .pagination button {
        padding: 10px 16px;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        background: white;
        color: #333;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .pagination button:hover {
        border-color: #2d8cf0;
        color: #2d8cf0;
      }
      .pagination button:disabled {
        color: #999;
        border-color: #eee;
        cursor: not-allowed;
      }

      /* ---- Footer ---- */
      .footer {
        text-align: center;
        margin-top: 20px;
        color: #bbb;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>📋 一览 - Demo Items</h1>
      <div class="time" id="currentTime"></div>
    </div>

    <div class="toolbar">
      <div class="record-count">共 <span id="totalCount">0</span> 件记录</div>
      <div class="actions">
        <button class="btn-primary" onclick="window.location.href = '/menu'">
          返回菜单
        </button>
        <button class="btn-outline" onclick="reloadPage()">🔄 刷新</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>订单号</th>
            <th>客户名</th>
            <th>商品名</th>
            <th>数量</th>
            <th>单价 (¥)</th>
            <th>总金额 (¥)</th>
            <th>订单日期</th>
            <th>状态</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="itemRows">
          <tr>
            <td colspan="10" class="empty-state">正在加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <label for="pageSizeSelect" style="display:flex;align-items:center;gap:8px;font-size:14px;color:#333;">
        每页显示
        <select id="pageSizeSelect" style="padding:8px 10px;border-radius:8px;border:1px solid #d9d9d9;font-size:14px;">
          <option value="5">5</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="60">60</option>
        </select>
      </label>
      <button id="prevPage" class="btn-outline">上一页</button>
      <span
        >第 <strong id="currentPage">1</strong> 页 / 共
        <strong id="totalPages">1</strong> 页</span
      >
      <button id="nextPage" class="btn-outline">下一页</button>
    </div>

    <div class="footer">Demo Application &copy; 2026</div>

    <script>
      let pageSize = 15;
      let currentPage = 1;
      let totalPages = 1;
      let items = [];

      function formatCurrency(value) {
        return Number(value || 0).toFixed(2);
      }

      function renderItems(items) {
        const rows = document.getElementById("itemRows");
        rows.innerHTML = "";
        if (!items || items.length === 0) {
          rows.innerHTML =
            '<tr><td colspan="10" class="empty-state">暂无数据</td></tr>';
          return;
        }

        items.forEach((item, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${(currentPage - 1) * pageSize + index + 1}</td>
            <td>${item.orderNo || ""}</td>
            <td>${item.customerName || ""}</td>
            <td>${item.productName || ""}</td>
            <td>${item.quantity || 0}</td>
            <td class="amount">${formatCurrency(item.unitPrice)}</td>
            <td class="amount">${formatCurrency(item.totalAmount)}</td>
            <td>${item.orderDate || ""}</td>
            <td>${renderStatus(item.status)}</td>
            <td>${item.remarks || "-"}</td>
          `;
          rows.appendChild(row);
        });
      }

      function renderStatus(status) {
        const text = status || "-";
        const lower = String(text).trim();
        if (lower === "已完成") {
          return `<span class="badge badge-done">${text}</span>`;
        }
        if (lower === "处理中") {
          return `<span class="badge badge-progress">${text}</span>`;
        }
        if (lower === "待处理") {
          return `<span class="badge badge-pending">${text}</span>`;
        }
        return `<span class="badge badge-pending">${text}</span>`;
      }

      function updatePager(total, page, pages) {
        document.getElementById("totalCount").textContent = total;
        document.getElementById("currentPage").textContent = page;
        document.getElementById("totalPages").textContent = pages;
        document.getElementById("prevPage").disabled = page <= 1;
        document.getElementById("nextPage").disabled = page >= pages;
      }

      function loadPage(page) {
        currentPage = Math.max(page, 1);
        fetch(`/api/items?page=${currentPage}&size=${pageSize}`)
          .then((res) => res.json())
          .then((result) => {
            const total = result.total || 0;
            items = result.items || [];
            totalPages = Math.max(Math.ceil(total / pageSize), 1);
            renderItems(items);
            updatePager(total, currentPage, totalPages);
          })
          .catch(() => {
            document.getElementById("itemRows").innerHTML =
              '<tr><td colspan="10" class="empty-state">数据加载失败，请稍后重试</td></tr>';
          });
      }

      function reloadPage() {
        loadPage(currentPage);
      }

      document.getElementById("pageSizeSelect").addEventListener("change", (event) => {
        pageSize = Number(event.target.value) || 15;
        currentPage = 1;
        loadPage(currentPage);
      });

      document.getElementById("prevPage").addEventListener("click", () => {
        if (currentPage > 1) {
          loadPage(currentPage - 1);
        }
      });

      document.getElementById("nextPage").addEventListener("click", () => {
        if (currentPage < totalPages) {
          loadPage(currentPage + 1);
        }
      });

      document.getElementById("currentTime").innerText =
        new Date().toLocaleString();
      document.getElementById("pageSizeSelect").value = pageSize;
      loadPage(currentPage);
    </script>
  </body>
</html>
